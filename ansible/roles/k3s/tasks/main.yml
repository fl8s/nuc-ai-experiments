---
- name: Disable swap
  command: swapoff -a
  ignore_errors: yes

- name: Install dependencies (Debian/Ubuntu)
  apt:
    name:
      - curl
      - wget
      - gnupg2
      - ca-certificates
      - apt-transport-https
      - open-iscsi
      - nfs-common
      - jq
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install dependencies (RedHat/Fedora)
  dnf:
    name:
      - curl
      - wget
      - gnupg2
      - ca-certificates
      - iscsi-initiator-utils
      - nfs-utils
      - jq
    state: present
  when: ansible_os_family == "RedHat"

- name: Check for /dev/kmsg
  stat:
    path: /dev/kmsg
  register: kmsg_stat

- name: Create /dev/kmsg symlink
  file:
    src: /dev/console
    dest: /dev/kmsg
    state: link
  when: not kmsg_stat.stat.exists

- name: Make /dev/kmsg and rshared persistent in /etc/rc.local
  copy:
    dest: /etc/rc.local
    content: |
      #!/bin/sh
      if [ ! -e /dev/kmsg ]; then
          ln -s /dev/console /dev/kmsg
      fi
      mount --make-rshared /
    mode: '0755'

- name: Make root mount shared
  command: mount --make-rshared /
  ignore_errors: yes

- name: Download k3s installation script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: '0755'

- name: Install k3s
  command: /tmp/install-k3s.sh
  environment:
    INSTALL_K3S_EXEC: "server --disable traefik --disable servicelb --write-kubeconfig-mode 644 --snapshotter=native --kubelet-arg=feature-gates=KubeletInUserNamespace=true --kube-controller-manager-arg=feature-gates=KubeletInUserNamespace=true --kube-apiserver-arg=feature-gates=KubeletInUserNamespace=true"
    K3S_KUBECONFIG_MODE: "644"
  args:
    creates: /usr/local/bin/k3s

- name: Wait for K3s node to be Ready
  command: /usr/local/bin/k3s kubectl get nodes
  register: kubectl_get_nodes
  until: "' Ready ' in kubectl_get_nodes.stdout"
  retries: 24
  delay: 5

- name: Set KUBECONFIG in /etc/environment
  lineinfile:
    path: /etc/environment
    regexp: '^KUBECONFIG='
    line: 'KUBECONFIG=/etc/rancher/k3s/k3s.yaml'

- name: Create symlink for kubectl
  file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link

- name: Create symlink for crictl
  file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/crictl
    state: link

- name: Configure nerdctl config directory
  file:
    path: /etc/nerdctl
    state: directory
    mode: '0755'

- name: Configure nerdctl config
  copy:
    dest: /etc/nerdctl/nerdctl.toml
    content: |
      namespace = "k8s.io"
      address = "/run/k3s/containerd/containerd.sock"
    mode: '0644'

- name: Download nerdctl release
  get_url:
    url: https://github.com/containerd/nerdctl/releases/download/v1.7.6/nerdctl-1.7.6-linux-amd64.tar.gz
    dest: /tmp/nerdctl.tar.gz

- name: Install nerdctl
  unarchive:
    src: /tmp/nerdctl.tar.gz
    dest: /usr/local/bin
    remote_src: yes
    creates: /usr/local/bin/nerdctl

- name: Download helm
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0755'

- name: Install helm
  command: /tmp/get_helm.sh
  environment:
    HELM_INSTALL_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/helm

- name: Add Intel Helm repository
  command: /usr/local/bin/helm repo add intel https://intel.github.io/helm-charts/
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Update Helm repositories
  command: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
